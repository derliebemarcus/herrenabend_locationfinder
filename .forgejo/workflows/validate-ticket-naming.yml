name: Validate ticket naming

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  validate:
    name: Validate branch and PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate naming convention
        shell: bash
        run: |
          set -euo pipefail

          head_ref="${FORGEJO_HEAD_REF:-}"
          actor="${FORGEJO_ACTOR:-}"
          repository_name="${FORGEJO_REPOSITORY##*/}"
          pr_title="$(
            node -e 'const fs=require("fs");const payload=JSON.parse(fs.readFileSync(process.env.FORGEJO_EVENT_PATH,"utf8"));process.stdout.write(payload.pull_request?.title ?? "")'
          )"
          pr_created_at="$(
            node -e 'const fs=require("fs");const payload=JSON.parse(fs.readFileSync(process.env.FORGEJO_EVENT_PATH,"utf8"));process.stdout.write(payload.pull_request?.created_at ?? "")'
          )"

          cutoff='2026-07-02T08:10:46Z'
          case "$actor" in
            dependabot[bot]|github-actions[bot]|forgejo-actions[bot]|renovate[bot])
              exit 0
              ;;
          esac

          if [[ -n "$pr_created_at" && "$pr_created_at" < "$cutoff" ]]; then
            echo "Legacy pull request created before $cutoff; naming is not enforced."
            exit 0
          fi

          type_pattern='(feature|enhancement|bugfix|hotfix|refactoring|maintenance|documentation|docs|security|test|research)'
          slug_pattern='[a-z0-9]+(-[a-z0-9]+)*'
          legacy_pattern="^${type_pattern}/([0-9]+)-${slug_pattern}$"
          repository_pattern="^${type_pattern}/([a-z0-9][a-z0-9._-]*)-([0-9]+)-${slug_pattern}$"
          title_pattern='^#([0-9]+)[[:space:]]+.+$'

          if [[ "$head_ref" =~ $legacy_pattern ]]; then
            branch_repository="$repository_name"
            branch_ticket="${BASH_REMATCH[2]}"
          elif [[ "$head_ref" =~ $repository_pattern ]]; then
            branch_repository="${BASH_REMATCH[2]}"
            branch_ticket="${BASH_REMATCH[3]}"
          else
            printf "Branch '%s' does not match an accepted ticket format.\n" "$head_ref" >&2
            exit 1
          fi

          if [[ ! "$pr_title" =~ $title_pattern ]]; then
            printf "PR title '%s' must begin with '#<ticket-number> '.\n" "$pr_title" >&2
            exit 1
          fi

          title_ticket="${BASH_REMATCH[1]}"
          if [[ "$branch_ticket" != "$title_ticket" ]]; then
            printf "Branch ticket #%s does not match PR title #%s.\n" \
              "$branch_ticket" "$title_ticket" >&2
            exit 1
          fi

          echo "Naming convention valid for $branch_repository ticket #$branch_ticket."
